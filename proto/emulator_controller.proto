syntax = "proto3";

package android.emulation.control;

// Minimal EmulatorController surface used by the Node touch bridge.
// For production, replace this with the SDK copy from:
// $ANDROID_SDK_ROOT/emulator/lib/emulator_controller.proto

service EmulatorController {
  rpc sendTouch(TouchEvent) returns (Empty) {}
  rpc streamInputEvent(stream InputEvent) returns (Empty) {}
  rpc getStatus(Empty) returns (EmulatorStatus) {}
  rpc getDisplayConfigurations(Empty) returns (DisplayConfigurations) {}
}

message Empty {}

message InputEvent {
  oneof type {
    TouchEvent touch_event = 2;
  }
}

message TouchEvent {
  repeated Touch touches = 1;
  int32 display = 2;
}

message Touch {
  int32 x = 1;
  int32 y = 2;
  int32 identifier = 3;
  int32 pressure = 4;
  int32 touch_major = 5;
  int32 touch_minor = 6;
  int32 expiration = 7;
  int32 orientation = 8;
}

message DisplayConfiguration {
  uint32 width = 1;
  uint32 height = 2;
  uint32 dpi = 3;
  uint32 flags = 4;
  uint32 display = 5;
}

message DisplayConfigurations {
  repeated DisplayConfiguration displays = 1;
  uint32 userConfigurable = 2;
  uint32 maxDisplays = 3;
}

message EmulatorStatus {
  string version = 1;
  uint64 uptime = 2;
  bool booted = 3;
  VmConfiguration vmConfig = 4;
  EntryList hardwareConfig = 5;
}

message VmConfiguration {}

message Entry {
  string key = 1;
  string value = 2;
}

message EntryList {
  repeated Entry entry = 1;
}
